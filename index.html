<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário RE:Zero</title>
</head>
<body>
    <div>
        <form action="farm de aura" method="POST">
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Insira seu nome" required>  
            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
            <br><br>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="4" placeholder="Personagem favorito de re:zero" required></textarea>
            <br><br>

            
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="1" max="120" placeholder="Digite sua idade" required>
            <br><br>

            
            <label for="classe">Classe favorita:</label>
            <select id="classe" name="classe" required>
                <option value="">Selecione uma opção</option>
                <option value="espadachim">Espadachim</option>
                <option value="mago">Mago</option>
                <option value="arqueiro">Arqueiro</option>
                <option value="curandeiro">Curandeiro</option>
            </select>
            <br><br>

            
            <label for="data">Data de envio:</label>
            <input type="date" id="data" name="data" required>
            <br><br>

            <button type="submit">Mandar</button>
        </form>
    </div>
</body>
</html>
